<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevScope — Analyze Your Developer Profile</title>
    <meta name="description" content="DevScope analyzes your GitHub profile and resume to generate a comprehensive developer score with actionable suggestions.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ─── Reset & Base ────────────────────────────────────────── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #ffffff;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-glow: rgba(99, 102, 241, 0.25);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border: #334155;
            --error: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.1);
            --success: #22c55e;
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
        }

        /* ─── Animated Background ─────────────────────────────────── */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
            animation: bgDrift 20s ease-in-out infinite alternate;
            z-index: -1;
        }

        @keyframes bgDrift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-3%, -3%) rotate(2deg); }
        }

        /* ─── Container ───────────────────────────────────────────── */
        .container {
            width: 100%;
            max-width: 560px;
            animation: fadeSlideUp 0.7s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ─── Header ──────────────────────────────────────────────── */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .logo-text {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #f8fafc, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* ─── Card ────────────────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 36px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3),
                        0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        /* ─── Form ────────────────────────────────────────────────── */
        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
            text-transform: none;
            margin-left: 4px;
        }

        .text-input {
            width: 100%;
            padding: 14px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            color: var(--text-dark);
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-sm);
            outline: none;
            transition: var(--transition);
        }

        .text-input::placeholder {
            color: #94a3b8;
        }

        .text-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
            background: #fff;
        }

        /* ─── Drop Zone ───────────────────────────────────────────── */
        .drop-zone {
            position: relative;
            border: 2px dashed #cbd5e1;
            border-radius: var(--radius-sm);
            padding: 32px 16px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: #f8fafc;
        }

        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.04);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .drop-zone.has-file {
            border-color: var(--success);
            border-style: solid;
            background: rgba(34, 197, 94, 0.04);
        }

        .drop-zone-icon {
            font-size: 36px;
            margin-bottom: 8px;
            display: block;
        }

        .drop-zone-text {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .drop-zone-text strong {
            color: var(--accent);
        }

        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-name {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--success);
        }

        .file-name.hidden {
            display: none;
        }

        /* ─── Button ──────────────────────────────────────────────── */
        .btn-primary {
            width: 100%;
            padding: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: var(--transition);
        }

        .btn-primary:hover:not(:disabled)::before {
            opacity: 1;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: #94a3b8;
        }

        /* ─── Loading State ───────────────────────────────────────── */
        .loading-overlay {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 48px 16px;
        }

        .loading-overlay.visible {
            display: flex;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e2e8f0;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .loading-sub {
            font-size: 12px;
            color: #94a3b8;
            margin-top: -12px;
        }

        /* ─── Error ───────────────────────────────────────────────── */
        .error-msg {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            background: var(--error-bg);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--error);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .error-msg.visible {
            display: flex;
        }

        .error-msg span.icon {
            font-size: 18px;
            flex-shrink: 0;
        }

        /* ─── Footer ──────────────────────────────────────────────── */
        .footer {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* ─── Responsive ──────────────────────────────────────────── */
        @media (max-width: 480px) {
            body {
                padding: 16px;
                align-items: flex-start;
                padding-top: 40px;
            }
            .card {
                padding: 24px;
            }
            .logo-text {
                font-size: 26px;
            }
            .logo-icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <span class="logo-text">DevScope</span>
            </div>
            <p class="subtitle">Analyze your developer profile in seconds</p>
        </div>

        <!-- Card -->
        <div class="card">
            <!-- Error -->
            <div class="error-msg" id="errorMsg">
                <span class="icon">⚠️</span>
                <span id="errorText">Something went wrong. Please try again.</span>
            </div>

            <!-- Form -->
            <form id="analyzeForm" autocomplete="off">
                <!-- GitHub Username -->
                <div class="form-group">
                    <label class="form-label" for="githubUsername">
                        GitHub Username
                        <span class="form-hint">— e.g. @octocat</span>
                    </label>
                    <input
                        type="text"
                        id="githubUsername"
                        class="text-input"
                        placeholder="Enter your GitHub username"
                        required
                    >
                </div>

                <!-- Resume Upload -->
                <div class="form-group">
                    <label class="form-label">
                        Resume
                        <span class="form-hint">— PDF only, max 5 MB</span>
                    </label>
                    <div class="drop-zone" id="dropZone">
                        <span class="drop-zone-icon">📄</span>
                        <div class="drop-zone-text">
                            Drag & drop your resume here<br>
                            or <strong>click to browse</strong>
                        </div>
                        <input type="file" id="resumeFile" accept=".pdf,application/pdf">
                    </div>
                    <div class="file-name hidden" id="fileName">
                        <span>✅</span>
                        <span id="fileNameText"></span>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-primary" id="submitBtn" disabled>
                    🚀 Analyze Profile
                </button>
            </form>

            <!-- Loading -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <div class="loading-text">Analyzing your profile…</div>
                <div class="loading-sub">Fetching GitHub data & scoring. This may take a moment.</div>
            </div>
        </div>


    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════
        //  Configuration
        // ═══════════════════════════════════════════════════════════════
        const API_BASE_URL = 'https://devportfolio-project-production.up.railway.app';

        // ═══════════════════════════════════════════════════════════════
        //  DOM References
        // ═══════════════════════════════════════════════════════════════
        const form           = document.getElementById('analyzeForm');
        const usernameInput  = document.getElementById('githubUsername');
        const resumeInput    = document.getElementById('resumeFile');
        const dropZone       = document.getElementById('dropZone');
        const fileNameEl     = document.getElementById('fileName');
        const fileNameText   = document.getElementById('fileNameText');
        const submitBtn      = document.getElementById('submitBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const errorMsg       = document.getElementById('errorMsg');
        const errorText      = document.getElementById('errorText');

        // ═══════════════════════════════════════════════════════════════
        //  Validation — enable/disable button
        // ═══════════════════════════════════════════════════════════════
        function validateForm() {
            const hasUsername = usernameInput.value.trim().length > 0;
            const hasFile     = resumeInput.files.length > 0;
            submitBtn.disabled = !(hasUsername && hasFile);
        }

        usernameInput.addEventListener('input', validateForm);
        resumeInput.addEventListener('change', () => {
            if (resumeInput.files.length > 0) {
                const file = resumeInput.files[0];
                fileNameText.textContent = file.name;
                fileNameEl.classList.remove('hidden');
                dropZone.classList.add('has-file');
            } else {
                fileNameEl.classList.add('hidden');
                dropZone.classList.remove('has-file');
            }
            validateForm();
        });

        // ─── Drag & Drop visual feedback ─────────────────────────────
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length > 0) {
                resumeInput.files = e.dataTransfer.files;
                resumeInput.dispatchEvent(new Event('change'));
            }
        });

        // ═══════════════════════════════════════════════════════════════
        //  Error Helpers
        // ═══════════════════════════════════════════════════════════════
        function showError(msg) {
            errorText.textContent = msg;
            errorMsg.classList.add('visible');
        }

        function hideError() {
            errorMsg.classList.remove('visible');
        }

        // ═══════════════════════════════════════════════════════════════
        //  Form Submission
        // ═══════════════════════════════════════════════════════════════
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const username = usernameInput.value.trim();
            const file     = resumeInput.files[0];

            if (!username || !file) return;

            // Switch to loading state
            form.style.display = 'none';
            loadingOverlay.classList.add('visible');

            try {
                // ── POST /api/analyze ───────────────────────────────
                const formData = new FormData();
                formData.append('githubUsername', username);
                formData.append('resume', file);

                const postRes = await fetch(`${API_BASE_URL}/api/analyze`, {
                    method: 'POST',
                    body: formData,
                });

                if (!postRes.ok) {
                    const errBody = await postRes.json().catch(() => null);
                    throw new Error(errBody?.error || `Server returned ${postRes.status}`);
                }

                const { id } = await postRes.json();

                // ── Poll GET /api/analyze/{id} every 2s ─────────────
                pollForResult(id);

            } catch (err) {
                form.style.display = 'block';
                loadingOverlay.classList.remove('visible');
                showError(err.message || 'Failed to start analysis. Is the backend running?');
            }
        });

        // ═══════════════════════════════════════════════════════════════
        //  Polling
        // ═══════════════════════════════════════════════════════════════
        function pollForResult(id) {
            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`${API_BASE_URL}/api/analyze/${id}`);

                    if (!res.ok) {
                        throw new Error(`Polling failed with status ${res.status}`);
                    }

                    const data = await res.json();

                    if (data.status === 'COMPLETED') {
                        clearInterval(interval);
                        window.location.href = `results.html?id=${id}`;
                    } else if (data.status === 'FAILED') {
                        clearInterval(interval);
                        form.style.display = 'block';
                        loadingOverlay.classList.remove('visible');
                        showError(data.suggestions || 'Analysis failed. Please check the username and try again.');
                    }
                    // else still PROCESSING — keep polling
                } catch (err) {
                    clearInterval(interval);
                    form.style.display = 'block';
                    loadingOverlay.classList.remove('visible');
                    showError(err.message || 'Lost connection while waiting for results.');
                }
            }, 2000);
        }
    </script>
</body>
</html>
